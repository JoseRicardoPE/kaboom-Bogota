<app-herovideo [media]="heroVideoMedia">
    <section class="pricing-container">
        <div class="pricing-content">
            <h1 class="title">Precios</h1>
            <h2 class="subtitle">
                Elige tu experiencia y prepárate para la diversión
            </h2>
        </div>

        <div class="pricing-cards">
            @for (service of services; track service.title) {
            <div class="pricing-card-content">
                <img class="pricing-img" 
                    [src]="service.image" 
                    [alt]="service.title"
                />

                <!-- OVERLAY (SOLO HOVER) -->
                <div class="pricing-overlay">
                    <h3 class="pricing-title">
                        {{ service.title }}
                    </h3>
                    <p class="pricing-extra">
                        {{ service.extra }}
                    </p>
                    @if (service.hasBooking) {
                        <a 
                            href="https://wa.me/573166912393"
                            target="_blank"
                            class="btn pricing-link"
                        >
                            Reservar
                        </a>
                    }
                </div>
            </div>
            }
        </div>
    </section>
</app-herovideo>
