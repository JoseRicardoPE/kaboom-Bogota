@if (href) {
    <a
        class="button"
        [class.button--modal]="variant === 'btn-modal'"
        [class.button--link]="variant === 'link'"
        [href]="disabled ? null : href"
        [target]="target"
        [attr.aria-label]="ariaLabel"
    >
        @if (icon) {
            <fa-icon class="button__icon" [icon]="icon"></fa-icon>
        }
        {{ text }}
    </a>
} @else if (routerLink) {
    <a
        class="button"
        [class.button--modal]="variant === 'btn-modal'"
        [class.button--link]="variant === 'link'"
        [routerLink]="disabled ? null : routerLink"
        [attr.aria-label]="ariaLabel"
        [attr.aria-disabled]="disabled"
    >
        @if (icon) {
            <fa-icon class="button__icon" [icon]="icon"></fa-icon>
        }
        {{ text }}
    </a>
} @else {
    <button
        class="button"
        type="button"
        [class.button--modal]="variant === 'btn-modal'"
        [class.button--link]="variant === 'link'"
        [disabled]="disabled"
        [attr.aria-label]="ariaLabel"
    >
        @if (icon) {
            <fa-icon class="button__icon" [icon]="icon"></fa-icon>
        }
        {{ text }}
    </button>
}
